<!-- adminpage.part.html -->

<body>

    <style>
        .filter-chip {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
            background: none;
            color: #777;
            cursor: pointer;
            font-size: 0.8em;
        }

        .filter-chip.active {
            background: #0070f3;
            color: white;
            border-color: #0070f3;
        }
    </style>

    <div id="toast-container"></div>

    <!-- Top Nav Bar -->
    <nav class="top-nav">
        <div style="display:flex;gap:8px;align-items:center;">
            <a href="/" class="btn btn-secondary" style="font-size:0.8em;padding:5px 12px;text-decoration:none;">←
                Back</a>
            <div class="top-nav-brand">
                <span class="nav-icon">📂</span>
                <span class="nav-title">File Drop</span>
                <span class="badge badge-admin" style="margin-left:4px;">ADMIN</span>
            </div>
        </div>
        <button id="filter-toggle-btn" onclick="toggleFilter()"
            style="background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.75em; display: flex; align-items: center; gap: 5px; line-height: 1;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.75-7.39A1 1 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z" />
            </svg>
            Filter
        </button>
    </nav>

    <!-- Unauthorized state (shown when no valid admin token is present) -->
    <div id="admin-unauth-wrapper" style="display:none; max-width:600px; margin:24px auto; padding:0 16px;">
        <div
            style="background:#1e1e1e;border:1px solid #4a1a1a;border-radius:10px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;">
            <span style="font-size:2em;">🔒</span>
            <span style="font-size:1.1em;font-weight:bold;color:white;">Admin Access Required</span>
            <p style="color:#888;font-size:0.85em;margin:0;">Please open the admin panel from your send link:<br><code
                    style="color:#64b5f6;">/admin?t=YOUR_ADMIN_TOKEN</code></p>
        </div>
    </div>

    <!-- Authorized content — hidden until token is verified by JS -->
    <div id="admin-main-wrapper" style="display:none;">

        <!-- Filter Panel -->
        <div id="filter-panel"
            style="display: none; background: #111; border-bottom: 1px solid #2a2a2a; padding: 12px 16px;">
            <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="filter-search" placeholder="Search by name or email…" oninput="applyFilter()"
                    style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 0.85em;">
                <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                    <span style="color: #555; font-size: 0.78em; width: 38px;">Status</span>
                    <button class="filter-chip active" data-group="status" data-value="all"
                        onclick="setChip(this)">All</button>
                    <button class="filter-chip" data-group="status" data-value="active"
                        onclick="setChip(this)">Active</button>
                    <button class="filter-chip" data-group="status" data-value="disabled"
                        onclick="setChip(this)">Disabled</button>
                </div>
                <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                    <span style="color: #555; font-size: 0.78em; width: 38px;">Role</span>
                    <button class="filter-chip active" data-group="role" data-value="all"
                        onclick="setChip(this)">All</button>
                    <button class="filter-chip" data-group="role" data-value="admin"
                        onclick="setChip(this)">Admin</button>
                    <button class="filter-chip" data-group="role" data-value="standard"
                        onclick="setChip(this)">Standard</button>
                </div>
                <div id="filter-count" style="color: #555; font-size: 0.78em; text-align: right;"></div>
            </div>
        </div>

        <!-- Access Requests Section -->
        <div
            style="padding: 24px 16px 8px 16px; max-width: 600px; margin: 0 auto; display:flex; align-items:center; gap:8px;">
            <h2 style="margin: 0; font-size: 1.3em; color: white; font-weight: 700;">Access Requests</h2>
            <span id="req-badge"
                style="display:none; font-size:0.75em; padding:2px 8px; border-radius:12px; background:#0070f3; color:white;"></span>
        </div>

        <div
            style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 4px 16px 8px 16px;">
            <div id="access-requests-list">
                <div style="color:#555;font-size:0.85em;text-align:center;padding:20px;">Loading…</div>
            </div>
        </div>

        <!-- Page Header -->
        <div style="padding: 24px 16px 8px 16px; max-width: 600px; margin: 0 auto;">
            <h1 style="margin: 0 0 4px 0; font-size: 1.5em; color: white; font-weight: 700;">Access Tokens</h1>
            <p style="margin: 0; color: #888; font-size: 0.85em;">Manage who can upload files and their permissions.</p>
        </div>

        <div
            style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 12px 16px 32px 16px;">

            <div id="create-new-user"
                style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
                <span style="font-size: 1.1em; font-weight: bold; color: white;">New Access Token</span>
                <div
                    style="display: flex; flex-direction: column; gap: 8px; padding-top: 4px; border-top: 1px solid #333;">
                    <input type="text" id="newUserName" placeholder="User Name"
                        style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 0.85em;">
                    <input type="email" id="newUserEmail" placeholder="User Email (optional)"
                        style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 0.85em;">
                    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                        <label
                            style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85em; cursor: pointer;">
                            <input type="checkbox" id="newUserIsAdmin"> Admin
                        </label>
                        <button id="createTokenBtn"
                            style="padding: 6px 12px; border-radius: 6px; border: none; background: #0070f3; color: white; cursor: pointer; font-size: 0.85em;">Create
                            Token</button>
                    </div>
                </div>
            </div>

            <div id="token-list">
                Loading token list content...
            </div>

        </div><!-- end shared container -->

    </div><!-- end admin-main-wrapper -->

    <!-- ── Modal overlay ── -->
    <div id="modal-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; overflow-y:auto; padding:24px 16px;">
        <div id="modal-box"
            style="background:#1a1a1a; border:1px solid #333; border-radius:12px; max-width:640px; margin:0 auto; display:flex; flex-direction:column; overflow:hidden;">

            <!-- Modal header -->
            <div
                style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid #2a2a2a; position:sticky; top:0; background:#1a1a1a; z-index:1;">
                <div>
                    <div id="modal-title" style="font-weight:700; font-size:1em; color:white;"></div>
                    <div id="modal-subtitle" style="font-size:0.78em; color:#666; margin-top:2px;"></div>
                </div>
                <button onclick="closeModal()"
                    style="background:none; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:20px; cursor:pointer; font-size:0.8em;">✕
                    Close</button>
            </div>

            <!-- Breadcrumb -->
            <div id="modal-breadcrumb"
                style="display:none; padding:10px 16px; border-bottom:1px solid #1e1e1e; font-size:0.78em; color:#555;">
                <button id="breadcrumb-back" onclick="showFileList()"
                    style="background:none; border:none; color:#64b5f6; cursor:pointer; font-size:inherit; padding:0;">←
                    Files</button>
                <span id="breadcrumb-file" style="color:#555;"></span>
            </div>

            <!-- Modal body -->
            <div id="modal-body" style="padding:16px; display:flex; flex-direction:column; gap:10px; min-height:120px;">
                <div style="color:#555; font-size:0.85em; text-align:center; padding:24px;">Loading…</div>
            </div>
        </div>
    </div>

</body>

<script>
    // Reusable toast notification — notify('message', 'success' | 'error' | 'info')
    function notify(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            toast.addEventListener('transitionend', () => toast.remove());
        }, duration);
    }

    // Admin token — populated after DOMContentLoaded verification
    let adminToken = null;

    // Centralised fetch helper — automatically attaches the admin Bearer token
    function adminFetch(url, opts = {}) {
        const headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${adminToken}` };
        return fetch(url, { ...opts, headers });
    }

    // Handle Create Token Button Click
    document.getElementById('createTokenBtn').addEventListener('click', async () => {
        const name = document.getElementById('newUserName').value.trim();
        const email = document.getElementById('newUserEmail').value.trim();
        const is_admin = document.getElementById('newUserIsAdmin').checked;

        if (!name) {
            notify('User name is required', 'error');
            return;
        }

        try {
            const response = await adminFetch('/admin/create-new-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_name: name, user_email: email, is_admin: is_admin })
            });
            const result = await response.json();
            if (result.success) {
                const joinUrl = `${window.location.origin}/send?t=${result.token}`;
                // Show the join link so the admin can copy and send it
                const linkBox = document.createElement('div');
                linkBox.style.cssText = 'margin-top:10px;padding:10px;background:#111;border:1px solid #333;border-radius:6px;font-size:0.8em;word-break:break-all;';
                linkBox.innerHTML = `<span style='color:#888;display:block;margin-bottom:4px;'>Join link for ${name}:</span><code style='color:#64b5f6;'>${joinUrl}</code><br><button onclick="navigator.clipboard.writeText('${joinUrl}').then(()=>{this.innerText='Copied!';setTimeout(()=>this.innerText='Copy Link',2000)})" style='margin-top:6px;padding:4px 10px;border-radius:6px;border:none;background:#0070f3;color:white;cursor:pointer;font-size:0.85em;'>Copy Link</button>`;
                document.getElementById('create-new-user').appendChild(linkBox);
                notify('Token created — copy the join link above', 'success');
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUserIsAdmin').checked = false;
                loadTokens(); // Refresh the token list
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    });


    // --- Filter state ---
    let allTokens = [];
    const filterState = { status: 'all', role: 'all' };

    // Render a subset of tokens into the list
    function renderCards(tokens) {
        if (!tokens.length) {
            document.getElementById('token-list').innerHTML =
                '<div style="color: #555; font-size: 0.9em; text-align: center; padding: 32px;">No tokens match your filters.</div>';
            return;
        }
        const cards = tokens.map(t => `
            <div style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;">
                    <span style="font-size: 1.1em; font-weight: bold; color: white;">${t.user_name}</span>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <span style="font-size: 0.75em; padding: 3px 8px; border-radius: 12px; background: ${t.is_active ? '#1a4a1a' : '#4a1a1a'}; color: ${t.is_active ? '#4caf50' : '#f44336'};">
                            ${t.is_active ? 'Enabled' : 'Disabled'}
                        </span>
                        ${t.is_admin ? '<span style="font-size: 0.75em; padding: 3px 8px; border-radius: 12px; background: #1a2a4a; color: #64b5f6;">Admin</span>' : ''}
                    </div>
                </div>
                <div style="color: #aaa; font-size: 0.85em;">${t.user_email || '<em>No email</em>'}</div>
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <code style="font-size: 0.8em; background: #111; padding: 4px 8px; border-radius: 6px; color: #ccc; word-break: break-all;">${t.token}</code>
                    <span style="color: #666; font-size: 0.8em;">${t.use_count} use${t.use_count !== 1 ? 's' : ''}</span>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding-top: 4px; border-top: 1px solid #333;">
                    <label style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85em; cursor: pointer;">
                        <input type="checkbox" ${t.is_admin ? 'checked' : ''} onchange="toggleAdmin('${t.token}', this.checked)"> Admin
                    </label>
                    <button onclick="${t.is_active ? 'disableToken' : 'enableToken'}('${t.token}')" style="padding: 6px 12px; border-radius: 6px; border: none; background: ${t.is_active ? '#3a3a3a' : '#0070f3'}; color: white; cursor: pointer; font-size: 0.85em;">${t.is_active ? 'Disable' : 'Enable'}</button>
                    <button onclick="copyJoinLink('${t.token}')" style="padding: 6px 12px; border-radius: 6px; border: none; background: #333; color: #64b5f6; cursor: pointer; font-size: 0.85em;">📋 Copy Link</button>
                    <button onclick="openFileList('${t.token}', '${t.user_name.replace(/'/g, "\\'")}')"
                        style="padding: 6px 12px; border-radius: 6px; border: none; background: #1a2a1a; color: #4caf50; cursor: pointer; font-size: 0.85em;">📁 Files &amp; Audit</button>
                </div>
            </div>
        `).join('');
        document.getElementById('token-list').innerHTML =
            `<div style="display: flex; flex-direction: column; gap: 12px;">${cards}</div>`;
    }

    // Filter allTokens and re-render without refetching
    function applyFilter() {
        const search = document.getElementById('filter-search').value.trim().toLowerCase();
        const filtered = allTokens.filter(t => {
            if (search && !t.user_name.toLowerCase().includes(search) && !(t.user_email || '').toLowerCase().includes(search)) return false;
            if (filterState.status === 'active' && !t.is_active) return false;
            if (filterState.status === 'disabled' && t.is_active) return false;
            if (filterState.role === 'admin' && !t.is_admin) return false;
            if (filterState.role === 'standard' && t.is_admin) return false;
            return true;
        });
        renderCards(filtered);
        document.getElementById('filter-count').textContent =
            filtered.length === allTokens.length
                ? `${allTokens.length} token${allTokens.length !== 1 ? 's' : ''}`
                : `${filtered.length} of ${allTokens.length} tokens`;
    }

    // Activate a chip and update filterState
    function setChip(el) {
        const group = el.dataset.group;
        filterState[group] = el.dataset.value;
        document.querySelectorAll(`.filter-chip[data-group="${group}"]`).forEach(chip => {
            chip.classList.toggle('active', chip === el);
        });
        applyFilter();
    }

    // Toggle filter panel visibility
    function toggleFilter() {
        const panel = document.getElementById('filter-panel');
        const btn = document.getElementById('filter-toggle-btn');
        const opening = panel.style.display === 'none';
        panel.style.display = opening ? 'block' : 'none';
        btn.style.color = opening ? '#64b5f6' : '#aaa';
        btn.style.borderColor = opening ? '#64b5f6' : '#444';
        if (opening) document.getElementById('filter-search').focus();
    }

    // Fetch tokens from server
    async function loadTokens() {
        try {
            const response = await adminFetch('/admin/tokens');
            allTokens = await response.json();
            applyFilter();
        } catch (error) {
            document.getElementById('token-list').innerHTML = `<p style="color: red;">Error loading tokens: ${error.message}</p>`;
        }
    }

    // Bootstrap: extract and verify the admin token before rendering any content
    window.addEventListener('DOMContentLoaded', () => {
        // Hide the filter button until we confirm admin access
        document.getElementById('filter-toggle-btn').style.display = 'none';

        const params = new URLSearchParams(window.location.search);
        // Check URL param first, then the admin-specific key, then fall back to the
        // sendpage's token key (d11_token) — both pages are same-origin so this works.
        adminToken = params.get('t') || localStorage.getItem('d11_admin_token') || localStorage.getItem('d11_token');

        if (!adminToken) {
            document.getElementById('admin-unauth-wrapper').style.display = '';
            return;
        }

        fetch('/api/user-info', { headers: { 'Authorization': `Bearer ${adminToken}` } })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.user.is_admin) {
                    localStorage.setItem('d11_admin_token', adminToken);
                    document.getElementById('admin-main-wrapper').style.display = '';
                    document.getElementById('filter-toggle-btn').style.display = '';
                    loadAccessRequests();
                    loadTokens();
                } else {
                    adminToken = null;
                    localStorage.removeItem('d11_admin_token');
                    document.getElementById('admin-unauth-wrapper').style.display = '';
                }
            })
            .catch(() => {
                document.getElementById('admin-unauth-wrapper').style.display = '';
            });
    });



    // Toggle admin status
    async function toggleAdmin(token, is_admin) {
        try {
            const response = await adminFetch('/admin/update-admin-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, is_admin: is_admin })
            });
            const result = await response.json();
            if (result.success) {
                notify(`Admin status ${is_admin ? 'granted' : 'removed'}`, 'success');
            } else {
                notify(`Error: ${result.error}`, 'error');
                loadTokens(); // Refresh to show original state
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
            loadTokens(); // Refresh to show original state
        }
    }

    // Disable a token
    async function disableToken(token) {
        try {
            const response = await adminFetch('/admin/disable-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await response.json();
            if (result.success) {
                notify('Token disabled', 'info');
                loadTokens();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    }

    // Enable a token
    async function enableToken(token) {
        try {
            const response = await adminFetch('/admin/enable-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await response.json();
            if (result.success) {
                notify('Token enabled', 'success');
                loadTokens();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    }

    // Copy join link to clipboard
    function copyJoinLink(token) {
        const url = `${window.location.origin}/send?t=${token}`;
        navigator.clipboard.writeText(url).then(() => {
            notify('Join link copied to clipboard', 'success');
        }).catch(() => {
            prompt('Copy this join link:', url);
        });
    }

    // ── Access Requests ────────────────────────────────────────

    async function loadAccessRequests() {
        try {
            const res = await adminFetch('/admin/access-requests');
            const requests = await res.json();
            const list = document.getElementById('access-requests-list');
            const pending = requests.filter(r => r.status === 'pending');
            const badge = document.getElementById('req-badge');

            if (pending.length > 0) {
                badge.textContent = `${pending.length} pending`;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }

            if (!requests.length) {
                list.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:20px;">No access requests yet.</div>';
                return;
            }

            list.innerHTML = requests.map(r => {
                const date = new Date(r.requested_at * 1000).toLocaleString();
                const reviewed = r.reviewed_at ? new Date(r.reviewed_at * 1000).toLocaleString() : null;
                const statusColor = r.status === 'pending' ? '#f59e0b' : r.status === 'approved' ? '#4caf50' : '#f44336';
                const statusBg = r.status === 'pending' ? '#2a2000' : r.status === 'approved' ? '#1a4a1a' : '#4a1a1a';
                const actions = r.status === 'pending' ? `
                    <button onclick="approveRequest(${r.id})" style="padding:5px 12px;border-radius:6px;border:none;background:#0070f3;color:white;cursor:pointer;font-size:0.82em;">Approve</button>
                    <button onclick="denyRequest(${r.id})" style="padding:5px 12px;border-radius:6px;border:1px solid #555;background:none;color:#aaa;cursor:pointer;font-size:0.82em;">Deny</button>
                ` : `<span style="font-size:0.78em;color:#555;">${reviewed ? `Reviewed ${reviewed}` : ''}</span>`;
                const msg = r.message ? `<div style="color:#888;font-size:0.8em;font-style:italic;margin-top:2px;">"${r.message}"</div>` : '';
                return `<div id="req-card-${r.id}" style="background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
                        <div>
                            <span style="font-size:1em;font-weight:bold;color:white;">${r.name}</span>
                            <div style="font-size:0.82em;color:#888;">${r.email}</div>
                            ${msg}
                        </div>
                        <span style="font-size:0.72em;padding:3px 8px;border-radius:12px;background:${statusBg};color:${statusColor};white-space:nowrap;">${r.status}</span>
                    </div>
                    <div style="font-size:0.75em;color:#555;">${date}</div>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:4px;border-top:1px solid #2a2a2a;">${actions}</div>
                </div>`;
            }).join('');
        } catch (err) {
            document.getElementById('access-requests-list').innerHTML =
                `<p style="color:red;font-size:0.85em;">Error loading requests: ${err.message}</p>`;
        }
    }

    async function approveRequest(id) {
        try {
            const res = await adminFetch('/admin/approve-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const result = await res.json();
            if (result.success) {
                const joinUrl = `${window.location.origin}${result.join_url}`;
                const card = document.getElementById(`req-card-${id}`);
                if (card) {
                    const actionsDiv = card.querySelector('div:last-child');
                    actionsDiv.innerHTML = `
                        <span style="font-size:0.78em;color:#4caf50;">Approved — </span>
                        <code style="font-size:0.75em;color:#64b5f6;word-break:break-all;">${joinUrl}</code>
                        <button onclick="navigator.clipboard.writeText('${joinUrl}').then(()=>{this.innerText='Copied!';setTimeout(()=>this.innerText='Copy',2000)})" style="padding:3px 8px;border-radius:6px;border:none;background:#0070f3;color:white;cursor:pointer;font-size:0.78em;">Copy</button>
                    `;
                    card.querySelector('[style*="border-radius:12px"]').textContent = 'approved';
                    card.querySelector('[style*="border-radius:12px"]').style.background = '#1a4a1a';
                    card.querySelector('[style*="border-radius:12px"]').style.color = '#4caf50';
                }
                notify('Request approved — copy the join link', 'success', 5000);
                loadAccessRequests();
                loadTokens();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (err) {
            notify(`Error: ${err.message}`, 'error');
        }
    }

    async function denyRequest(id) {
        if (!confirm('Deny this access request?')) return;
        try {
            const res = await adminFetch('/admin/deny-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const result = await res.json();
            if (result.success) {
                notify('Request denied', 'info');
                loadAccessRequests();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (err) {
            notify(`Error: ${err.message}`, 'error');
        }
    }

    // ── Modal helpers ──────────────────────────────────────────

    let _modalToken = null;
    let _modalName = null;

    function openModal(title, subtitle) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-subtitle').textContent = subtitle;
        document.getElementById('modal-breadcrumb').style.display = 'none';
        document.getElementById('modal-body').innerHTML =
            '<div style="color:#555;font-size:0.85em;text-align:center;padding:24px;">Loading…</div>';
        document.getElementById('modal-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.style.overflow = '';
        _modalToken = null;
        _modalName = null;
    }

    // Close on backdrop click
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ── File list view ─────────────────────────────────────────

    async function openFileList(token, userName) {
        _modalToken = token;
        _modalName = userName;
        openModal(`${userName}'s Files`, 'Metadata only — no download access');
        showFileList();
    }

    async function showFileList() {
        document.getElementById('modal-breadcrumb').style.display = 'none';
        document.getElementById('modal-title').textContent = `${_modalName}'s Files`;
        document.getElementById('modal-subtitle').textContent = 'Metadata only — no download access';
        const body = document.getElementById('modal-body');
        body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:24px;">Loading…</div>';

        try {
            const res = await adminFetch(`/admin/user-files/${_modalToken}`);
            const files = await res.json();

            if (!files.length) {
                body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:24px;">No files uploaded yet.</div>';
                return;
            }

            body.innerHTML = files.map(f => {
                const mb = (f.file_size_bytes / 1024 / 1024).toFixed(2);
                const uploadDate = new Date(f.uploaded_at * 1000).toLocaleString();
                const lastDl = f.last_downloaded_at
                    ? new Date(f.last_downloaded_at * 1000).toLocaleString()
                    : 'Never';
                const deleted = f.deleted_at
                    ? '<span style="font-size:0.75em;padding:2px 6px;border-radius:8px;background:#4a1a1a;color:#f44336;margin-left:6px;">Deleted</span>'
                    : '';
                return `
                <div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                        <div style="font-size:0.85em;font-weight:600;color:white;word-break:break-all;">${f.original_filename}${deleted}</div>
                        <div style="font-size:0.75em;color:#555;white-space:nowrap;">${mb} MB</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:0.75em;color:#666;">
                        <span>Uploaded ${uploadDate}</span>
                        <span>${f.download_count} download${f.download_count !== 1 ? 's' : ''}</span>
                    </div>
                    <div style="font-size:0.75em;color:#555;">Last downloaded: ${lastDl}</div>
                    <div style="padding-top:6px;border-top:1px solid #1e1e1e;">
                        <button onclick="openAuditLog('${f.slug}', '${f.original_filename.replace(/'/g, "\\'")}')"
                            style="padding:4px 10px;border-radius:6px;border:none;background:#1a2a3a;color:#64b5f6;cursor:pointer;font-size:0.78em;">🔍 View Audit Log</button>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            body.innerHTML = '<div style="color:#f87171;font-size:0.85em;text-align:center;padding:24px;">Failed to load files.</div>';
        }
    }

    // ── Audit log view ─────────────────────────────────────────

    async function openAuditLog(slug, filename) {
        document.getElementById('modal-title').textContent = 'Download Audit Log';
        document.getElementById('modal-subtitle').textContent = filename;
        const bc = document.getElementById('modal-breadcrumb');
        bc.style.display = 'block';
        document.getElementById('breadcrumb-file').textContent = ` › ${filename}`;
        const body = document.getElementById('modal-body');
        body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:24px;">Loading…</div>';

        try {
            const res = await adminFetch(`/admin/download-log/${slug}`);
            const events = await res.json();

            if (!events.length) {
                body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:24px;">No downloads recorded yet.</div>';
                return;
            }

            const deviceIcon = d => ({ mobile: '📱', tablet: '📱', desktop: '💻', bot: '🤖' }[d] || '❓');

            body.innerHTML = events.map((e, i) => `
                <div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:4px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;">
                        <span style="font-size:0.85em;font-weight:600;color:white;">${deviceIcon(e.device_type)} Event #${events.length - i}</span>
                        <span style="font-size:0.75em;color:#888;">${new Date(e.downloaded_at * 1000).toLocaleString()}</span>
                    </div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:0.78em;color:#aaa;margin-top:2px;">
                        <span>🌍 ${e.country || '??'}</span>
                        <span>📟 ${e.device_type || 'unknown'}</span>
                        ${e.referer ? `<span>🔗 ${e.referer}</span>` : ''}
                    </div>
                    <div style="font-size:0.72em;color:#555;margin-top:2px;word-break:break-all;">${e.user_agent || ''}</div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:0.72em;color:#444;margin-top:2px;">
                        ${e.ip_address ? `<span>IP hash: <code style="color:#333;">${e.ip_address}</code></span>` : ''}
                        ${e.cf_ray ? `<span>Ray: <code style="color:#333;">${e.cf_ray}</code></span>` : ''}
                    </div>
                </div>`).join('');
        } catch (err) {
            body.innerHTML = '<div style="color:#f87171;font-size:0.85em;text-align:center;padding:24px;">Failed to load audit log.</div>';
        }
    }
</script>

</html>
