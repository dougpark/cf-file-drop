<!-- adminpage.part.html -->

<body>

    <style>
        .filter-chip {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
            background: none;
            color: #777;
            cursor: pointer;
            font-size: 0.8em;
        }

        .filter-chip.active {
            background: #0070f3;
            color: white;
            border-color: #0070f3;
        }
    </style>

    <div id="toast-container"></div>

    <!-- Top Nav Bar -->
    <div
        style="position: sticky; top: 0; z-index: 100; background: #111; border-bottom: 1px solid #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.4em;">📂</span>
            <span style="color: white; font-weight: 700; font-size: 1em; letter-spacing: 0.5px;">File Drop</span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <span
                style="font-size: 0.7em; padding: 3px 10px; border-radius: 12px; background: #1a2a4a; color: #64b5f6; font-weight: 600; letter-spacing: 0.5px;">ADMIN</span>
            <button id="filter-toggle-btn" onclick="toggleFilter()"
                style="background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.75em; display: flex; align-items: center; gap: 5px; line-height: 1;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.75-7.39A1 1 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z" />
                </svg>
                Filter
            </button>
        </div>
    </div>

    <!-- Filter Panel -->
    <div id="filter-panel"
        style="display: none; background: #111; border-bottom: 1px solid #2a2a2a; padding: 12px 16px;">
        <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="filter-search" placeholder="Search by name or email…" oninput="applyFilter()"
                style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 0.85em;">
            <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                <span style="color: #555; font-size: 0.78em; width: 38px;">Status</span>
                <button class="filter-chip active" data-group="status" data-value="all"
                    onclick="setChip(this)">All</button>
                <button class="filter-chip" data-group="status" data-value="active"
                    onclick="setChip(this)">Active</button>
                <button class="filter-chip" data-group="status" data-value="disabled"
                    onclick="setChip(this)">Disabled</button>
            </div>
            <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                <span style="color: #555; font-size: 0.78em; width: 38px;">Role</span>
                <button class="filter-chip active" data-group="role" data-value="all"
                    onclick="setChip(this)">All</button>
                <button class="filter-chip" data-group="role" data-value="admin" onclick="setChip(this)">Admin</button>
                <button class="filter-chip" data-group="role" data-value="standard"
                    onclick="setChip(this)">Standard</button>
            </div>
            <div id="filter-count" style="color: #555; font-size: 0.78em; text-align: right;"></div>
        </div>
    </div>

    <!-- Page Header -->
    <div style="padding: 24px 16px 8px 16px; max-width: 600px; margin: 0 auto;">
        <h1 style="margin: 0 0 4px 0; font-size: 1.5em; color: white; font-weight: 700;">Access Tokens</h1>
        <p style="margin: 0; color: #888; font-size: 0.85em;">Manage who can upload files and their permissions.</p>
    </div>

    <div
        style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 12px 16px 32px 16px;">

        <div id="create-new-user"
            style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 1.1em; font-weight: bold; color: white;">New Access Token</span>
            <div style="display: flex; flex-direction: column; gap: 8px; padding-top: 4px; border-top: 1px solid #333;">
                <input type="text" id="newUserName" placeholder="User Name"
                    style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 0.85em;">
                <input type="email" id="newUserEmail" placeholder="User Email (optional)"
                    style="width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; font-size: 0.85em;">
                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                    <label
                        style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85em; cursor: pointer;">
                        <input type="checkbox" id="newUserIsAdmin"> Admin
                    </label>
                    <button id="createTokenBtn"
                        style="padding: 6px 12px; border-radius: 6px; border: none; background: #0070f3; color: white; cursor: pointer; font-size: 0.85em;">Create
                        Token</button>
                </div>
            </div>
        </div>

        <div id="token-list">
            Loading token list content...
        </div>

    </div><!-- end shared container -->

</body>

<script>
    // Reusable toast notification — notify('message', 'success' | 'error' | 'info')
    function notify(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            toast.addEventListener('transitionend', () => toast.remove());
        }, duration);
    }

    // Handle Create Token Button Click
    document.getElementById('createTokenBtn').addEventListener('click', async () => {
        const name = document.getElementById('newUserName').value.trim();
        const email = document.getElementById('newUserEmail').value.trim();
        const is_admin = document.getElementById('newUserIsAdmin').checked;

        if (!name) {
            notify('User name is required', 'error');
            return;
        }

        try {
            const response = await fetch('/admin/create-new-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_name: name, user_email: email, is_admin: is_admin })
            });
            const result = await response.json();
            if (result.success) {
                notify('Token created successfully', 'success');
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUserIsAdmin').checked = false;
                loadTokens(); // Refresh the token list
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    });


    // --- Filter state ---
    let allTokens = [];
    const filterState = { status: 'all', role: 'all' };

    // Render a subset of tokens into the list
    function renderCards(tokens) {
        if (!tokens.length) {
            document.getElementById('token-list').innerHTML =
                '<div style="color: #555; font-size: 0.9em; text-align: center; padding: 32px;">No tokens match your filters.</div>';
            return;
        }
        const cards = tokens.map(t => `
            <div style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;">
                    <span style="font-size: 1.1em; font-weight: bold; color: white;">${t.user_name}</span>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <span style="font-size: 0.75em; padding: 3px 8px; border-radius: 12px; background: ${t.is_active ? '#1a4a1a' : '#4a1a1a'}; color: ${t.is_active ? '#4caf50' : '#f44336'};">
                            ${t.is_active ? 'Enabled' : 'Disabled'}
                        </span>
                        ${t.is_admin ? '<span style="font-size: 0.75em; padding: 3px 8px; border-radius: 12px; background: #1a2a4a; color: #64b5f6;">Admin</span>' : ''}
                    </div>
                </div>
                <div style="color: #aaa; font-size: 0.85em;">${t.user_email || '<em>No email</em>'}</div>
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <code style="font-size: 0.8em; background: #111; padding: 4px 8px; border-radius: 6px; color: #ccc; word-break: break-all;">${t.token}</code>
                    <span style="color: #666; font-size: 0.8em;">${t.use_count} use${t.use_count !== 1 ? 's' : ''}</span>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding-top: 4px; border-top: 1px solid #333;">
                    <label style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85em; cursor: pointer;">
                        <input type="checkbox" ${t.is_admin ? 'checked' : ''} onchange="toggleAdmin('${t.token}', this.checked)"> Admin
                    </label>
                    <button onclick="disableToken('${t.token}')" style="padding: 6px 12px; border-radius: 6px; border: none; background: #555; color: white; cursor: pointer; font-size: 0.85em;">Disable</button>
                    <button onclick="enableToken('${t.token}')" style="padding: 6px 12px; border-radius: 6px; border: none; background: #0070f3; color: white; cursor: pointer; font-size: 0.85em;">Enable</button>
                    <button onclick="copyJoinLink('${t.token}')" style="padding: 6px 12px; border-radius: 6px; border: none; background: #333; color: #64b5f6; cursor: pointer; font-size: 0.85em;">📋 Copy Link</button>
                </div>
            </div>
        `).join('');
        document.getElementById('token-list').innerHTML =
            `<div style="display: flex; flex-direction: column; gap: 12px;">${cards}</div>`;
    }

    // Filter allTokens and re-render without refetching
    function applyFilter() {
        const search = document.getElementById('filter-search').value.trim().toLowerCase();
        const filtered = allTokens.filter(t => {
            if (search && !t.user_name.toLowerCase().includes(search) && !(t.user_email || '').toLowerCase().includes(search)) return false;
            if (filterState.status === 'active' && !t.is_active) return false;
            if (filterState.status === 'disabled' && t.is_active) return false;
            if (filterState.role === 'admin' && !t.is_admin) return false;
            if (filterState.role === 'standard' && t.is_admin) return false;
            return true;
        });
        renderCards(filtered);
        document.getElementById('filter-count').textContent =
            filtered.length === allTokens.length
                ? `${allTokens.length} token${allTokens.length !== 1 ? 's' : ''}`
                : `${filtered.length} of ${allTokens.length} tokens`;
    }

    // Activate a chip and update filterState
    function setChip(el) {
        const group = el.dataset.group;
        filterState[group] = el.dataset.value;
        document.querySelectorAll(`.filter-chip[data-group="${group}"]`).forEach(chip => {
            chip.classList.toggle('active', chip === el);
        });
        applyFilter();
    }

    // Toggle filter panel visibility
    function toggleFilter() {
        const panel = document.getElementById('filter-panel');
        const btn = document.getElementById('filter-toggle-btn');
        const opening = panel.style.display === 'none';
        panel.style.display = opening ? 'block' : 'none';
        btn.style.color = opening ? '#64b5f6' : '#aaa';
        btn.style.borderColor = opening ? '#64b5f6' : '#444';
        if (opening) document.getElementById('filter-search').focus();
    }

    // Fetch tokens from server
    async function loadTokens() {
        try {
            const response = await fetch('/admin/tokens');
            allTokens = await response.json();
            applyFilter();
        } catch (error) {
            document.getElementById('token-list').innerHTML = `<p style="color: red;">Error loading tokens: ${error.message}</p>`;
        }
    }

    // Load tokens when page loads
    window.addEventListener('DOMContentLoaded', loadTokens);



    // Toggle admin status
    async function toggleAdmin(token, is_admin) {
        try {
            const response = await fetch('/admin/update-admin-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, is_admin: is_admin })
            });
            const result = await response.json();
            if (result.success) {
                notify(`Admin status ${is_admin ? 'granted' : 'removed'}`, 'success');
            } else {
                notify(`Error: ${result.error}`, 'error');
                loadTokens(); // Refresh to show original state
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
            loadTokens(); // Refresh to show original state
        }
    }

    // Disable a token
    async function disableToken(token) {
        try {
            const response = await fetch('/admin/disable-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await response.json();
            if (result.success) {
                notify('Token disabled', 'info');
                loadTokens();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    }

    // Enable a token
    async function enableToken(token) {
        try {
            const response = await fetch('/admin/enable-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const result = await response.json();
            if (result.success) {
                notify('Token enabled', 'success');
                loadTokens();
            } else {
                notify(`Error: ${result.error}`, 'error');
            }
        } catch (error) {
            notify(`Error: ${error.message}`, 'error');
        }
    }

    // Copy join link to clipboard
    function copyJoinLink(token) {
        const url = `https://drop.d11cloud.com/join?t=${token}`;
        navigator.clipboard.writeText(url).then(() => {
            notify('Join link copied to clipboard', 'success');
        }).catch(() => {
            prompt('Copy this join link:', url);
        });
    }
</script>

</html>
