<!-- download.part.html -->

<body>

    <div id="toast-container"></div>

    <!-- Top Nav Bar -->
    <div class="top-nav">
        <div class="top-nav-brand">
            <span class="nav-icon">📂</span>
            <span class="nav-title">File Drop</span>
        </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
        <h1>You've got a file!</h1>
        <p>Sent to you via File Drop.</p>
    </div>

    <div class="page-content">

        <!-- Sender card -->
        <div class="page-card">
            <span class="page-card-title">From</span>
            <div class="page-card-body">
                <div class="icon-row">
                    <span class="row-icon">👤</span>
                    <span class="row-name">{{sender_name}}</span>
                </div>
            </div>
        </div>

        <!-- File card -->
        <div class="page-card">
            <span class="page-card-title">File</span>
            <div class="page-card-body">
                <div class="icon-row">
                    <span class="row-icon">📄</span>
                    <div>
                        <div class="row-title">{{original_filename}}</div>
                        <div class="row-sub">{{file_size}}</div>
                    </div>
                </div>
                <a href="/f/{{slug}}/raw" onclick="handleDownload()" class="btn-download">
                    ⬇️ Download File
                </a>
                <p class="footnote">{{remaining}} of {{MAX_DOWNLOADS}} downloads remaining</p>
                <p class="footnote">⏳ Expires {{expires_at}}</p>
            </div>
        </div>

    </div>

</body>

<script>
    function handleDownload() {
        setTimeout(() => { window.location.reload(); }, 2000);
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            window.location.reload();
        }
    });
</script>

</html>
