<!-- download.part.html -->

<body>

    <div id="toast-container"></div>

    <!-- Top Nav Bar -->
    <div
        style="position: sticky; top: 0; z-index: 100; background: #111; border-bottom: 1px solid #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.4em;">📂</span>
            <span style="color: white; font-weight: 700; font-size: 1em; letter-spacing: 0.5px;">File Drop</span>
        </div>
    </div>

    <!-- Page Header -->
    <div
        style="padding: 24px 16px 8px 16px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center;">
        <h1 style="margin: 0 0 4px 0; font-size: 1.5em; color: white; font-weight: 700;">You've got a file!</h1>
        <p style="margin: 0; color: #888; font-size: 0.85em;">Sent to you via File Drop.</p>
    </div>

    <div
        style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 12px 16px 32px 16px;">

        <!-- Sender card -->
        <div
            style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 1.1em; font-weight: bold; color: white;">From</span>
            <div style="padding-top: 4px; border-top: 1px solid #333; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.8em;">👤</span>
                <span style="font-size: 1.1em; color: #64b5f6; font-weight: 600;">{{sender_name}}</span>
            </div>
        </div>

        <!-- File card -->
        <div
            style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 1.1em; font-weight: bold; color: white;">File</span>
            <div
                style="padding-top: 4px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.8em;">📄</span>
                    <div>
                        <div style="color: white; font-weight: 600; font-size: 0.95em; word-break: break-all;">
                            {{original_filename}}</div>
                        <div style="color: #888; font-size: 0.8em; margin-top: 2px;">{{file_size}}</div>
                    </div>
                </div>
                <a href="/f/{{slug}}/raw" onclick="handleDownload()"
                    style="display: block; text-align: center; padding: 10px 16px; border-radius: 8px; background: #0070f3; color: white; font-weight: 600; font-size: 0.9em; text-decoration: none; cursor: pointer;">
                    ⬇️ Download File
                </a>
                <div style="text-align: center; color: #555; font-size: 0.78em;">
                    {{remaining}} of {{MAX_DOWNLOADS}} downloads remaining
                </div>
            </div>
        </div>

    </div>

</body>

<script>
    function handleDownload() {
        setTimeout(() => { window.location.reload(); }, 2000);
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            window.location.reload();
        }
    });
</script>

</html>
