<!-- sendpage.part.html -->

<body>

    <div id="toast-container"></div>

    <!-- Top Nav Bar -->
    <nav class="top-nav">
        <div class="top-nav-brand">
            <span class="nav-icon">📂</span>
            <span class="nav-title">File Drop</span>
        </div>
        <div class="nav-user-menu">
            <button class="nav-user-btn" id="userMenuBtn" onclick="toggleUserMenu()" aria-label="User menu">
                <span class="nav-user-icon">👤</span>
            </button>
            <div class="nav-dropdown" id="userMenu">
                <a id="admin-menu-link" href="/admin" class="nav-dropdown-item hidden">⚙️ Admin Panel</a>
                <a href="/profile" class="nav-dropdown-item">👤 Profile</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-content">

        <!-- Unauthorized state -->
        <div id="unauthorized" class="page-card hidden">
            <div class="status-block">
                <span class="status-icon">🔒</span>
                <p class="status-title">Access Required</p>
                <p class="status-body">Please use a valid join link to access File Drop.</p>
            </div>
        </div>

        <!-- Authorized state -->
        <div id="authorized" class="card-stack hidden">

            <!-- Upload card -->
            <div class="page-card">
                <span class="page-card-title">Upload a File</span>
                <div class="page-card-body">
                    <div id="dropZone" class="drop-zone">
                        Drag &amp; Drop or tap to choose a file
                    </div>
                    <input type="file" id="fileInput">
                    <div id="status" class="upload-status"></div>
                </div>
            </div>

            <!-- Stats card -->
            <div id="stats" class="page-card">
                <span class="page-card-title">Usage Statistics</span>
                <div class="page-card-body">
                    <div class="meta-row">
                        <span class="meta-label">Files Uploaded</span>
                        <span class="meta-value" id="totalUploads">—</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Storage Used</span>
                        <span class="meta-value" id="totalStorage">—</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Last Activity</span>
                        <span class="meta-value" id="lastActivity">—</span>
                    </div>
                </div>
            </div>

            <!-- Recent Drops card -->
            <div class="page-card">
                <span class="page-card-title">Recent Drops</span>
                <div class="page-card-body">
                    <ul id="recent-list" class="recent-list">
                        <li class="list-empty">Loading...</li>
                    </ul>
                </div>
            </div>

        </div><!-- end authorized -->

    </div><!-- end page-content -->

    <!-- Download activity modal -->
    <div id="activity-overlay" class="modal-overlay" onclick="if(event.target===this) closeActivityModal()">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-info">
                    <div id="activity-title" class="modal-title"></div>
                    <div id="activity-meta" class="modal-meta"></div>
                    <div class="modal-hint">Download history — visible only to you</div>
                </div>
                <button class="modal-close-btn" onclick="closeActivityModal()">✕ Close</button>
            </div>
            <div id="activity-body" class="modal-body">
                <div class="list-empty">Loading…</div>
            </div>
        </div>
    </div>

</body>

<script>
    function notify(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            toast.addEventListener('transitionend', () => toast.remove());
        }, duration);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('t') || localStorage.getItem('d11_token');
    let senderName = '';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');

    if (!token) {
        document.getElementById('unauthorized').classList.remove('hidden');
    } else {
        fetch('/api/user-info', {
            headers: { 'Authorization': `Bearer ${token}` }
        }).then(res => res.json()).then(data => {
            if (data.success) {
                localStorage.setItem('d11_token', token);
                senderName = data.user.user_name;
                document.querySelector('.nav-title').textContent = `${senderName}'s File Drop`;
                document.getElementById('authorized').classList.remove('hidden');
                if (data.user.is_admin) {
                    document.getElementById('admin-menu-link').classList.remove('hidden');
                }
                loadStats(token);
                loadRecent();
            } else {
                localStorage.removeItem('d11_token');
                document.getElementById('unauthorized').classList.remove('hidden');
                notify('Your session has expired. Please use a new join link.', 'error');
            }
        });
    }

    // Drag & drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        window.addEventListener(eventName, e => e.preventDefault(), false);
        document.body.addEventListener(eventName, e => e.preventDefault(), false);
    });
    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length) uploadFile(files[0]);
    });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    async function uploadFile(file) {
        if (!token) return;
        status.className = 'upload-status';
        status.textContent = `Uploading ${file.name}…`;
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch('/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                const shareUrl = data.share_url;
                status.innerHTML = `<span class="text-success">✅ Uploaded!</span> &nbsp;<button class="btn copy-btn" onclick="copyToClipboard('${shareUrl}', this)">Copy Link</button>`;
                notify('File uploaded successfully', 'success');
                loadRecent();
                loadStats(token);
            } else {
                status.className = 'upload-status text-error';
                status.textContent = '❌ Upload failed: ' + (data.error || 'Unknown error');
            }
        } catch (err) {
            status.className = 'upload-status text-error';
            status.textContent = '❌ Error connecting to server.';
        }
    }

    async function loadStats(t) {
        try {
            const res = await fetch('/api/stats', { headers: { 'Authorization': `Bearer ${t}` } });
            const s = await res.json();
            document.getElementById('totalUploads').textContent = s.file_count ?? 0;
            const mb = (s.total_bytes ?? 0) / 1024 / 1024;
            document.getElementById('totalStorage').textContent =
                mb >= 1 ? `${mb.toFixed(1)} MB` : `${((s.total_bytes ?? 0) / 1024).toFixed(1)} KB`;
            document.getElementById('lastActivity').textContent =
                s.last_activity ? new Date(s.last_activity * 1000).toLocaleDateString() : 'Never';
        } catch {
            ['totalUploads', 'totalStorage', 'lastActivity'].forEach(
                id => document.getElementById(id).textContent = '—'
            );
        }
    }

    async function loadRecent() {
        const list = document.getElementById('recent-list');
        try {
            const res = await fetch('/api/recent', { headers: { 'Authorization': `Bearer ${token}` } });
            const files = await res.json();
            if (!Array.isArray(files) || files.length === 0) {
                list.innerHTML = '<li class="list-empty">No files uploaded yet.</li>';
                return;
            }
            const origin = window.location.origin;
            list.innerHTML = files.map(f => {
                const fullUrl = `${origin}/f/${f.slug}`;
                const sizeKb = (f.file_size_bytes / 1024).toFixed(0);
                const now = Math.floor(Date.now() / 1000);
                const expired = f.expires_at && f.expires_at < now;
                const expiryText = f.expires_at
                    ? (expired
                        ? `<span id="expiry-${f.slug}" class="text-error">Expired</span>`
                        : `<span id="expiry-${f.slug}">Expires ${new Date(f.expires_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>`)
                    : `<span id="expiry-${f.slug}"></span>`;
                const dlCount = f.download_count ?? 0;
                const dlMax = f.max_downloads ?? 3;
                return `
                    <li class="recent-item">
                        <div class="recent-item-top">
                            <div class="recent-item-info">
                                <div class="recent-item-name">${f.original_filename}</div>
                                <div class="recent-item-meta">${new Date(f.uploaded_at * 1000).toLocaleDateString()} &middot; ${sizeKb} KB &middot; ${expiryText} &middot; <span id="dls-${f.slug}" data-count="${dlCount}">${dlCount}/${dlMax} dls</span></div>
                            </div>
                        </div>
                        <div class="recent-item-actions">
                            <button class="btn copy-btn" onclick="copyToClipboard('${fullUrl}', this)">Copy Link</button>
                            <a href="${fullUrl}" class="btn download-btn" title="Open share page">↗</a>
                            <button class="btn btn-activity" onclick="openActivityModal('${f.slug}', '${f.original_filename.replace(/'/g, "\\'").replace(/"/g, '&quot;')}', ${f.uploaded_at}, ${f.file_size_bytes})" title="View download activity">📊</button>
                            <button class="btn btn-purple" onclick="extendExpiry('${f.slug}', this)" title="Add 3 days to expiry">+3 Days</button>
                            <button class="btn btn-teal" onclick="extendDownloads('${f.slug}', this)" title="Add 3 more downloads">+3 Downloads</button>
                        </div>
                    </li>`;
            }).join('');
        } catch (e) {
            list.innerHTML = '<li class="list-empty text-error">Failed to load history.</li>';
        }
    }

    async function openActivityModal(slug, filename, uploadedAt, fileSizeBytes) {
        document.getElementById('activity-title').textContent = filename;
        const sizeMb = fileSizeBytes >= 1024 * 1024
            ? (fileSizeBytes / 1024 / 1024).toFixed(2) + ' MB'
            : (fileSizeBytes / 1024).toFixed(0) + ' KB';
        const uploadDate = uploadedAt ? new Date(uploadedAt * 1000).toLocaleString() : '';
        document.getElementById('activity-meta').innerHTML = [
            `<span class="meta-chip">📅 ${uploadDate}</span>`,
            `<span class="meta-chip">💾 ${sizeMb}</span>`,
            senderName ? `<span class="meta-chip meta-chip-blue">👤 ${senderName}</span>` : ''
        ].filter(Boolean).join('');
        const body = document.getElementById('activity-body');
        body.innerHTML = '<div class="list-empty">Loading…</div>';
        document.getElementById('activity-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        try {
            const res = await fetch(`/api/file-activity/${slug}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const events = await res.json();
            if (!Array.isArray(events) || events.length === 0) {
                body.innerHTML = '<div class="list-empty">No downloads yet.</div>';
                return;
            }
            const deviceIcon = d => ({ mobile: '📱', tablet: '📱', desktop: '💻', bot: '🤖' }[d] || '❓');
            body.innerHTML = events.map(e => `
                <div class="activity-row">
                    <div class="activity-row-left">
                        <span class="activity-device-icon">${deviceIcon(e.device_type)}</span>
                        <span class="activity-country">${e.country || '??'}</span>
                        <span class="activity-device-type">${e.device_type || 'unknown'}</span>
                    </div>
                    <div class="activity-row-time">${new Date(e.downloaded_at * 1000).toLocaleString()}</div>
                </div>`).join('');
        } catch {
            body.innerHTML = '<div class="list-empty text-error">Failed to load activity.</div>';
        }
    }

    function closeActivityModal() {
        document.getElementById('activity-overlay').style.display = 'none';
        document.body.style.overflow = '';
    }

    async function copyToClipboard(text, btn) {
        try {
            await navigator.clipboard.writeText(text);
            const orig = btn.innerText;
            btn.innerText = 'Copied!';
            btn.classList.add('success');
            setTimeout(() => { btn.innerText = orig; btn.classList.remove('success'); }, 2000);
        } catch {
            alert('Could not copy link. Check browser permissions.');
        }
    }

    async function extendExpiry(slug, btn) {
        btn.disabled = true;
        try {
            const res = await fetch('/api/extend-expiry', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug })
            });
            const data = await res.json();
            if (data.success) {
                const newDate = new Date(data.expires_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const el = document.getElementById(`expiry-${slug}`);
                if (el) { el.className = ''; el.textContent = `Expires ${newDate}`; }
                notify('Expiry extended by 3 days', 'success');
            } else {
                notify('Failed to extend expiry', 'error');
            }
        } catch { notify('Failed to extend expiry', 'error'); }
        btn.disabled = false;
    }

    function toggleUserMenu() {
        document.getElementById('userMenu').classList.toggle('open');
    }
    document.addEventListener('click', function (e) {
        if (!document.getElementById('userMenuBtn').contains(e.target)) {
            document.getElementById('userMenu').classList.remove('open');
        }
    });

    async function extendDownloads(slug, btn) {
        btn.disabled = true;
        try {
            const res = await fetch('/api/extend-downloads', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug })
            });
            const data = await res.json();
            if (data.success) {
                const el = document.getElementById(`dls-${slug}`);
                if (el) el.textContent = `${el.dataset.count}/${data.max_downloads} dls`;
                notify('+3 downloads added', 'success');
            } else {
                notify('Failed to extend downloads', 'error');
            }
        } catch { notify('Failed to extend downloads', 'error'); }
        btn.disabled = false;
    }
</script>

</html>
