<!-- newupload.part.html -->

<body>

  <div id="toast-container"></div>

  <!-- Top Nav Bar -->
  <div
    style="position: sticky; top: 0; z-index: 100; background: #111; border-bottom: 1px solid #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 1.4em;">📂</span>
      <span style="color: white; font-weight: 700; font-size: 1em; letter-spacing: 0.5px;">File Drop</span>
    </div>
    <button onclick="window.location.href='/join'"
      style="background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.75em;">←
      Back</button>
  </div>

  <!-- Page Header -->
  <div
    style="padding: 24px 16px 8px 16px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center;">
    <h1 id="greeting" style="margin: 0 0 4px 0; font-size: 1.5em; color: white; font-weight: 700;">Your Drop Zone</h1>
    <p style="margin: 0; color: #888; font-size: 0.85em;">Drop a file below to get a shareable link.</p>
  </div>

  <div
    style="display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; padding: 12px 16px 32px 16px;">

    <!-- Unauthorized state -->
    <div id="unauth-msg" class="hidden"
      style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px; text-align: center;">
      <span style="font-size: 2em;">🔒</span>
      <span style="font-size: 1.1em; font-weight: bold; color: white;">Access Required</span>
      <p style="color: #888; font-size: 0.85em; margin: 0;">Please use a valid join link to access File Drop.</p>
    </div>

    <!-- Upload card -->
    <div id="upload-ui" class="hidden"
      style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
      <span style="font-size: 1.1em; font-weight: bold; color: white;">Upload a File</span>
      <div style="padding-top: 4px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 8px;">
        <div id="dropZone"
          style="border: 2px dashed #444; padding: 32px 16px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; background: #111; color: #888; font-size: 0.9em;">
          Drag &amp; Drop or tap to choose a file
        </div>
        <input type="file" id="fileInput">
        <div id="status" style="min-height: 1.4em; font-size: 0.85em; text-align: center; color: #aaa;"></div>
      </div>
    </div>

    <!-- Recent Drops card -->
    <div id="recent-card" class="hidden"
      style="background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px;">
      <span style="font-size: 1.1em; font-weight: bold; color: white;">Recent Drops</span>
      <div style="padding-top: 4px; border-top: 1px solid #333;">
        <ul id="recent-list"
          style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px;">
          <li style="color: #555; font-size: 0.85em;">Loading...</li>
        </ul>
      </div>
    </div>

  </div><!-- end container -->

  <!-- Download activity modal -->
  <div id="activity-overlay"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; overflow-y:auto; padding:24px 16px;"
    onclick="if(event.target===this) closeActivityModal()">
    <div
      style="background:#1a1a1a; border:1px solid #333; border-radius:12px; max-width:480px; margin:0 auto; display:flex; flex-direction:column; overflow:hidden;">
      <div
        style="display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid #2a2a2a; position:sticky; top:0; background:#1a1a1a;">
        <div style="flex:1;min-width:0;">
          <div id="activity-title"
            style="font-weight:700; font-size:0.95em; color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          </div>
          <div id="activity-meta" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;"></div>
          <div style="font-size:0.72em; color:#444; margin-top:4px;">Download history — visible only to you</div>
        </div>
        <button onclick="closeActivityModal()"
          style="background:none; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:20px; cursor:pointer; font-size:0.8em;">✕
          Close</button>
      </div>
      <div id="activity-body" style="padding:16px; display:flex; flex-direction:column; gap:8px; min-height:80px;">
        <div style="color:#555; font-size:0.85em; text-align:center; padding:20px;">Loading…</div>
      </div>
    </div>
  </div>

</body>

<script>
  function notify(message, type = 'info', duration = 3000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      toast.addEventListener('transitionend', () => toast.remove());
    }, duration);
  }

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('t') || localStorage.getItem('d11_token');

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const status = document.getElementById('status');
  let senderName = '';

  if (!token) {
    document.getElementById('unauth-msg').classList.remove('hidden');
  } else {
    fetch('/api/user-info', {
      headers: { 'Authorization': `Bearer ${token}` }
    }).then(r => r.json()).then(data => {
      if (!data.success) {
        document.getElementById('unauth-msg').classList.remove('hidden');
      } else {
        localStorage.setItem('d11_token', token);
        senderName = data.user.user_name;
        document.getElementById('greeting').textContent = `${senderName}'s Drop Zone`;
        document.getElementById('upload-ui').classList.remove('hidden');
        document.getElementById('recent-card').classList.remove('hidden');
        loadRecent();
      }
    });
  }

  // Fix Safari Drag & Drop
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    window.addEventListener(eventName, e => e.preventDefault(), false);
    document.body.addEventListener(eventName, e => e.preventDefault(), false);
  });

  dropZone.addEventListener('dragover', () => {
    dropZone.style.borderColor = '#0070f3';
    dropZone.style.background = '#1a1a2e';
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.style.borderColor = '#444';
    dropZone.style.background = '#111';
  });
  dropZone.addEventListener('drop', (e) => {
    dropZone.style.borderColor = '#444';
    dropZone.style.background = '#111';
    const files = e.dataTransfer.files;
    if (files.length) uploadFile(files[0]);
  });
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadFile(fileInput.files[0]);
  });

  async function uploadFile(file) {
    if (!token) return;
    status.style.color = '#aaa';
    status.textContent = `Uploading ${file.name}…`;
    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (data.success) {
        const shareUrl = data.share_url;
        status.innerHTML = `<span style="color:#4caf50;">✅ Uploaded!</span> &nbsp;<button class="btn copy-btn" onclick="copyToClipboard('${shareUrl}', this)">Copy Link</button>`;
        notify('File uploaded successfully', 'success');
        loadRecent();
      } else {
        status.style.color = '#f87171';
        status.textContent = '❌ Upload failed: ' + (data.error || 'Unknown error');
      }
    } catch (err) {
      status.style.color = '#f87171';
      status.textContent = '❌ Error connecting to server.';
    }
  }

  async function loadRecent() {
    const list = document.getElementById('recent-list');
    try {
      const res = await fetch('/api/recent', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const files = await res.json();

      if (!Array.isArray(files) || files.length === 0) {
        list.innerHTML = '<li style="color:#555;font-size:0.85em;">No files uploaded yet.</li>';
        return;
      }

      const origin = window.location.origin;
      list.innerHTML = files.map(f => {
        const fullUrl = `${origin}/f/${f.slug}`;
        const sizeKb = (f.file_size_bytes / 1024).toFixed(0);
        return `
                <li style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="flex:1;min-width:0;">
                        <div style="color:white;font-size:0.85em;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.original_filename}</div>
                        <div style="color:#555;font-size:0.75em;margin-top:2px;">${new Date(f.uploaded_at * 1000).toLocaleDateString()} &middot; ${sizeKb} KB</div>
                    </div>
                    <div style="display:flex;gap:6px;flex-shrink:0;">
                        <button class="btn copy-btn" onclick="copyToClipboard('${fullUrl}', this)">Copy Link</button>
                        <a href="${fullUrl}" class="btn download-btn" title="Open share page" style="line-height:1.6;">↗</a>
                        <button class="btn" onclick="openActivityModal('${f.slug}', '${f.original_filename.replace(/'/g, "\\'").replace(/"/g, '&quot;')}', ${f.uploaded_at}, ${f.file_size_bytes})" title="View download activity" style="background:#1a2a1a;color:#4caf50;border:1px solid #2a4a2a;">📊</button>
                    </div>
                </li>`;
      }).join('');
    } catch (e) {
      list.innerHTML = '<li style="color:#f87171;font-size:0.85em;">Failed to load history.</li>';
    }
  }

  async function openActivityModal(slug, filename, uploadedAt, fileSizeBytes) {
    document.getElementById('activity-title').textContent = filename;

    const sizeMb = fileSizeBytes >= 1024 * 1024
      ? (fileSizeBytes / 1024 / 1024).toFixed(2) + ' MB'
      : (fileSizeBytes / 1024).toFixed(0) + ' KB';
    const uploadDate = uploadedAt ? new Date(uploadedAt * 1000).toLocaleString() : '';
    document.getElementById('activity-meta').innerHTML = [
      `<span style="font-size:0.75em;color:#888;">📅 ${uploadDate}</span>`,
      `<span style="font-size:0.75em;color:#888;">💾 ${sizeMb}</span>`,
      senderName ? `<span style="font-size:0.75em;color:#64b5f6;">👤 ${senderName}</span>` : ''
    ].filter(Boolean).join('');

    const body = document.getElementById('activity-body');
    body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:20px;">Loading…</div>';
    document.getElementById('activity-overlay').style.display = 'block';
    document.body.style.overflow = 'hidden';

    try {
      const res = await fetch(`/api/file-activity/${slug}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const events = await res.json();

      if (!Array.isArray(events) || events.length === 0) {
        body.innerHTML = '<div style="color:#555;font-size:0.85em;text-align:center;padding:20px;">No downloads yet.</div>';
        return;
      }

      // <span style="font-size:1.1em;">${deviceIcon(e.device_type)}</span>
      // const deviceIcon = d => ({ mobile: '📱', tablet: '📱', desktop: '💻', bot: '🤖' }[d] || '❓');
      body.innerHTML = events.map((e, i) => `
        <div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:0.85em;color:#aaa;">
            
            <span style="color:#888;">${e.country || 'na'}</span>
            <span style="color:#666;font-size:0.78em;">${e.device_type || 'unknown'}</span>
          </div>
          <div style="font-size:0.75em;color:#555;white-space:nowrap;">${new Date(e.downloaded_at * 1000).toLocaleString()}</div>
        </div>`).join('');
    } catch {
      body.innerHTML = '<div style="color:#f87171;font-size:0.85em;text-align:center;padding:20px;">Failed to load activity.</div>';
    }
  }

  function closeActivityModal() {
    document.getElementById('activity-overlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  async function copyToClipboard(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.innerText;
      btn.innerText = 'Copied!';
      btn.classList.add('success');
      setTimeout(() => { btn.innerText = orig; btn.classList.remove('success'); }, 2000);
    } catch {
      alert('Could not copy link. Check browser permissions.');
    }
  }
</script>

</html>
