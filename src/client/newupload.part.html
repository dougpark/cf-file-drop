<!-- newupload.part.html -->

<body>
  <h1>File Drop</h1>

  <div id="unauth-msg" class="hidden" style="text-align:center; padding: 20px; color: #f87171;">🔒 Invalid or missing
    access token. Please use your join link.</div>

  <div id="upload-ui">
    <div style="padding: 20px 16px 8px 16px; max-width: 600px; margin: 0 auto; text-align: center;">
      <h2 id="greeting" style="margin: 0 0 4px 0; font-size: 1.3em; color: white; font-weight: 700;">Your</h2>
      <p style="margin: 0; color: #888; font-size: 0.85em;">Drop a file below to get a shareable link.</p>
    </div>
    <div id="dropZone" class="drop-zone">
      Drag & Drop or Tap to Upload
    </div>
    <input type="file" id="fileInput">

    <div id="status" style="margin-top: 20px; text-align: center; min-height: 1.5em;"></div>

    <h2 style="margin-top: 40px;">Recent Drops</h2>
    <ul id="recent-list">
      <li>Loading history...</li>
    </ul>
  </div>

  <script>
    // Resolve token from URL ?t= param, then localStorage fallback
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('t') || localStorage.getItem('d11_token');

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const list = document.getElementById('recent-list');

    if (!token) {
      document.getElementById('upload-ui').classList.add('hidden');
      document.getElementById('unauth-msg').classList.remove('hidden');
    } else {
      // Validate the token before letting anything proceed
      fetch('/api/user-info', {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => r.json()).then(data => {
        if (!data.success) {
          document.getElementById('upload-ui').classList.add('hidden');
          document.getElementById('unauth-msg').classList.remove('hidden');
        } else {
          localStorage.setItem('d11_token', token);
          document.getElementById('greeting').textContent = `${data.user.user_name}`;
          loadRecent();
        }
      });
    }

    // 1. Fix Safari Drag & Drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      window.addEventListener(eventName, e => e.preventDefault(), false);
      document.body.addEventListener(eventName, e => e.preventDefault(), false);
    });

    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length) uploadFile(files[0]);
    });

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    // 2. Upload Logic — token sent as Authorization header
    async function uploadFile(file) {
      if (!token) return;
      status.innerText = `Uploading ${file.name}...`;
      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          const shareUrl = data.share_url;
          status.innerHTML =
            `✅ Uploaded! <button class="btn copy-btn" onclick="copyToClipboard('${shareUrl}', this)">Copy Link</button>`;
          loadRecent();
        } else {
          status.innerText = '❌ Upload failed: ' + (data.error || 'Unknown error');
        }
      } catch (err) {
        status.innerText = '❌ Error connecting to server.';
      }
    }

    // 3. Load Recent — scoped to this user's token
    async function loadRecent() {
      try {
        const res = await fetch('/api/recent', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const files = await res.json();

        if (!Array.isArray(files) || files.length === 0) {
          list.innerHTML = '<li>No files uploaded yet.</li>';
          return;
        }

        const origin = window.location.origin;
        list.innerHTML = files.map(f => {
          const fullUrl = `${origin}/f/${f.slug}`;
          return `
    <li class="file-item">
      <div style="flex: 1; margin-right: 15px;">
        <strong style="display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">
          ${f.original_filename}
        </strong>
        <small style="color: #888;">${new Date(f.uploaded_at * 1000).toLocaleDateString()}</small>
      </div>
      <div class="button-group">
        <a href="${fullUrl}" class="btn download-btn" title="Open share page">↗</a>
        <button class="btn copy-btn" onclick="copyToClipboard('${fullUrl}', this)">Copy</button>
      </div>
    </li>
  `;
        }).join('');
      } catch (e) {
        list.innerHTML = '<li>Failed to load history.</li>';
      }
    }

    async function copyToClipboard(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        const originalText = btn.innerText;
        btn.innerText = 'Copied!';
        btn.classList.add('success');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('success');
        }, 2000);
      } catch (err) {
        alert('Could not copy link. Check browser permissions.');
      }
    }
  </script>
</body>

</html>
